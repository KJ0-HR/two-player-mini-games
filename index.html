<!doctype html>
<html lang="zh-CN">
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>双人小游戏</title>
  <link rel="icon" type="image/png" href="./assets/favicon.png" />
  <link rel="apple-touch-icon" href="./assets/favicon.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
  <body class="entry-active">
    <div class="scroll-progress" aria-hidden="true"><span></span></div>
    <div class="scene-layers" aria-hidden="true">
      <div class="scene-texture"></div>
      <div class="scene-dust"></div>
    </div>
    <section class="entry-cover" id="entryCover" aria-label="进入游戏">
      <div class="entry-cover-panel">
        <button id="enterGame" type="button">开始游戏</button>
      </div>
    </section>
    <main class="app-shell">
      <section class="page-frame">
        <nav class="frame-nav" aria-label="主导航">
          <a class="nav-brand" href="./" aria-label="双人小游戏首页">
            <span class="brand-mark">2P</span>
            <span>双人小游戏</span>
          </a>
          <div class="nav-links">
            <a href="#authPanel">账户</a>
            <a href="#setupPanel">房间</a>
            <a href="#lobbyPanel">对局</a>
          </div>
          <button class="menu-button secondary" type="button" aria-label="菜单"><span></span></button>
        </nav>

        <div class="hero-layout">
          <section class="hero-copy" aria-label="双人小游戏介绍">
            <p class="hero-kicker">Quiet play, shared moments</p>
            <h1>双人小游戏</h1>
            <p>把房间号交给朋友，在一张干净的页面里开始一局轻松的双人游戏。</p>
          </section>

          <figure class="hero-visual" aria-hidden="true">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=82" alt="" />
          </figure>

          <section class="panel setup-panel" id="authPanel">
            <div class="brand">
              <div class="brand-mark">2P</div>
              <div>
                <h2>登录账户</h2>
                <p>先登录或注册账户，再进入双人房间。</p>
              </div>
            </div>

            <form id="authForm" class="room-form">
              <label class="field">
                <span>游戏ID</span>
                <input id="accountId" name="accountId" maxlength="16" autocomplete="username" placeholder="例如 player01" />
              </label>

              <label class="field">
                <span>密码</span>
                <input id="accountPassword" name="accountPassword" type="password" maxlength="32" autocomplete="current-password" placeholder="至少 4 位" />
              </label>

              <div class="actions">
                <button type="submit" data-action="login">登录</button>
                <button type="submit" class="secondary" data-action="register">注册</button>
              </div>
            </form>

            <p class="status" id="authStatus" role="status"></p>
          </section>

          <section class="panel setup-panel hidden" id="setupPanel">
            <div class="account-bar">
              <div class="account-profile">
                <div class="avatar-preview" id="accountAvatar">?</div>
                <span>当前账户：<strong id="accountLabel"></strong></span>
              </div>
              <div class="account-actions">
                <input id="avatarFile" class="file-input" type="file" accept="image/*" />
                <button type="button" class="secondary" id="chooseAvatar">选择头像</button>
                <button type="button" class="secondary" id="logoutAccount">退出登录</button>
              </div>
            </div>

            <form id="roomForm" class="room-form">
              <label class="field game-select-field">
                <span>房主选择游戏</span>
                <select id="gameId" name="gameId">
                  <option value="1">游戏 1：数学计算能力</option>
                  <option value="2">游戏 2：五子棋对决</option>
                  <option value="3">游戏 3：赛车竞速</option>
                  <option value="4">游戏 4：待接入</option>
                  <option value="5">游戏 5：待接入</option>
                </select>
              </label>

              <div class="game-split-selector" aria-label="游戏选择">
                <button type="button" class="game-slice active" data-game="1">
                  <img src="./assets/game-math.png" alt="" />
                  <span class="slice-index">01</span>
                  <strong>数学计算能力比拼</strong>
                </button>
                <button type="button" class="game-slice" data-game="2">
                  <img src="./assets/game-gomoku.png" alt="" />
                  <span class="slice-index">02</span>
                  <strong>五子棋对决</strong>
                </button>
                <button type="button" class="game-slice" data-game="3">
                  <img src="./assets/game-racing.png" alt="" />
                  <span class="slice-index">03</span>
                  <strong>赛车竞速</strong>
                </button>
                <button type="button" class="game-slice empty" data-game="4">
                  <span class="slice-index">04</span>
                  <strong>敬请期待</strong>
                </button>
                <button type="button" class="game-slice empty" data-game="5">
                  <span class="slice-index">05</span>
                  <strong>敬请期待</strong>
                </button>
              </div>

              <div class="room-control-bar">
                <button class="primary-action" type="submit" data-action="create">我是房主，一键创建房间</button>
                <label class="field join-field">
                  <span>玩家二输入房间号</span>
                  <input id="roomCode" name="roomCode" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="5832" />
                </label>
                <button type="submit" class="secondary" data-action="join">加入房间</button>
              </div>
            </form>

            <p class="status" id="setupStatus" role="status"></p>
          </section>
        </div>

        <section class="panel lobby-panel hidden" id="lobbyPanel">
          <header class="lobby-header">
            <div>
              <p class="eyebrow">房间 <span id="activeRoomCode"></span></p>
              <h2 id="activeGameName">游戏 1：待接入</h2>
            </div>
            <button class="secondary" id="leaveRoom" type="button">离开</button>
          </header>

          <div class="copy-row">
            <input id="inviteLink" readonly />
            <button id="copyInvite" type="button">复制邀请链接</button>
          </div>

          <div class="lobby-grid">
            <section class="players">
              <h3>玩家</h3>
              <div id="playerList" class="player-list"></div>
            </section>

            <section class="game-placeholder">
              <h3>游戏区域</h3>
              <div class="stage" id="gameStage">
                <div class="stage-card">
                  <strong id="stageTitle">等待两位玩家进入</strong>
                  <span id="stageHint">这里之后会加载对应游戏模块。</span>
                </div>
              </div>
            </section>
          </div>

          <div class="lobby-actions">
            <button id="readyToggle" type="button">准备</button>
            <button id="startGame" type="button" disabled>开始游戏</button>
          </div>

          <p class="status" id="lobbyStatus" role="status"></p>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
